# =============================================================================
# iACC - Staging/Development Deployment Workflow
# =============================================================================
# Triggered on push to develop branch
# Deploys to: dev.iacc.f2.co.th (staging) or staging folder
# =============================================================================

name: 🧪 Deploy to Staging

on:
  push:
    branches:
      - develop
  workflow_dispatch:  # Allow manual trigger

env:
  DEPLOY_PATH: .  # FTP user root = staging subdomain folder

jobs:
  # =========================================================================
  # Job 1: Build and Test
  # =========================================================================
  build:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        
      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mysqli, mbstring, xml, gd, curl, pdo, pdo_mysql
          
      - name: ✅ PHP Syntax Check — Core Files
        timeout-minutes: 2
        run: |
          echo "Checking core files..."
          php -l index.php
          php -l login.php
          php -l api.php
          php -l landing.php
          php -l inc/class.dbconn.php
          php -l inc/security.php
          php -l app/Config/routes.php
          echo "✅ Core syntax check passed"

      - name: ✅ PHP Syntax Check — MVC Layer
        timeout-minutes: 3
        run: |
          echo "Checking Controllers..."
          find app/Controllers -name "*.php" | xargs -I {} php -l {}
          echo "Checking Models..."
          find app/Models -name "*.php" | xargs -I {} php -l {}
          echo "Checking Services..."
          find app/Services -name "*.php" | xargs -I {} php -l {}
          echo "Checking Views..."
          find app/Views -name "*.php" | xargs -I {} php -l {}
          echo "✅ MVC syntax check passed"

      - name: 📦 Install Composer dependencies
        run: |
          composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist
          echo "✅ Composer dependencies installed"
          
      - name: 📦 Create deployment artifact
        run: |
          mkdir -p deploy
          rsync -av --progress \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='.DS_Store' \
            --exclude='.venv' \
            --exclude='.env' \
            --exclude='docker' \
            --exclude='docker-compose*.yml' \
            --exclude='Dockerfile' \
            --exclude='*.bak' \
            --exclude='*.backup' \
            --exclude='build' \
            --exclude='node_modules' \
            --exclude='legacy' \
            --exclude='tests' \
            --exclude='backups' \
            --exclude='TODAY_WORK_SUMMARY*.txt' \
            --exclude='phpstan.neon' \
            --exclude='deploy*.sh' \
            --exclude='DEPLOYMENT_FILE_INDEX.sh' \
            --exclude='backup.sh' \
            --exclude='inc/sys.configs.php' \
            --exclude='inc/docker-settings.json' \
            --exclude='logs/*.log' \
            --exclude='cache/*' \
            --exclude='.htaccess' \
            ./ deploy/
            
      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: staging-deploy
          path: deploy/
          retention-days: 3

  # =========================================================================
  # Job 2: Deploy to Staging
  # =========================================================================
  deploy:
    name: 🧪 Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: staging
      url: https://dev.iacc.f2.co.th
    
    steps:
      - name: 📥 Download artifact
        uses: actions/download-artifact@v4
        with:
          name: staging-deploy
          path: deploy/
          
      - name: 🔧 Prepare staging config
        env:
          STAGING_DB_HOST: ${{ secrets.DB_HOST_STAGING }}
          STAGING_DB_USER: ${{ secrets.DB_USERNAME_STAGING }}
          STAGING_DB_PASS: ${{ secrets.DB_PASSWORD_STAGING }}
          STAGING_DB_NAME: ${{ secrets.DB_NAME_STAGING }}
        run: |
          # Use cPanel htaccess for staging
          if [ -f deploy/.htaccess.cpanel ]; then
            cp deploy/.htaccess.cpanel deploy/.htaccess
          fi

          # Generate staging sys.configs.php
          {
            echo '<?PHP'
            echo '$composerAutoload = dirname(__FILE__) . "/../vendor/autoload.php";'
            echo 'if (file_exists($composerAutoload)) { require_once($composerAutoload); }'
            echo 'require_once(dirname(__FILE__) . "/error-handler.php");'
            echo "ini_set('session.cookie_httponly', 1);"
            echo "ini_set('session.use_strict_mode', 1);"
            echo "ini_set('session.cookie_samesite', 'Lax');"
            echo 'if (!empty($_SERVER["HTTPS"]) && $_SERVER["HTTPS"] !== "off") {'
            echo '    ini_set("session.cookie_secure", 1);'
            echo '}'
            echo '$appEnv = "staging";'
            echo "\$config[\"hostname\"] = \"${STAGING_DB_HOST}\";"
            echo "\$config[\"username\"] = \"${STAGING_DB_USER}\";"
            echo "\$config[\"password\"] = \"${STAGING_DB_PASS}\";"
            echo "\$config[\"dbname\"]   = \"${STAGING_DB_NAME}\";"
            echo 'date_default_timezone_set("Asia/Bangkok");'
            echo '$config["docker_tools"] = "off";'
            echo '$config["container_manager"] = "off";'
            echo "define('DOCKER_SETTINGS_FILE', dirname(__FILE__) . '/docker-settings.json');"
          } > deploy/inc/sys.configs.php

          echo "✅ Staging config generated"
          head -5 deploy/inc/sys.configs.php
          
      - name: 📤 Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        timeout-minutes: 30
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME_STAGING }}
          password: ${{ secrets.FTP_PASSWORD_STAGING }}
          protocol: ftps
          local-dir: ./deploy/
          server-dir: ${{ env.DEPLOY_PATH }}/
          timeout: 300000
          log-level: verbose
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.env
            **/logs/*.log
            **/cache/*
            **/backups/*
            
      - name: ✅ Deployment notification
        run: |
          echo "✅ Staging deployment completed!"
          echo "🌐 URL: https://dev.iacc.f2.co.th"
          echo "📅 Time: $(date)"
          echo "🔖 Commit: ${{ github.sha }}"
          echo ""
          echo "📋 Next steps:"
          echo "   1. Test the staging environment"
          echo "   2. If all tests pass, create PR to main"
          echo "   3. Merge to main for production deployment"

  # =========================================================================
  # Job 3: Post-Deploy Notification
  # =========================================================================
  notify:
    name: 📢 Notify Team
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    
    steps:
      - name: 📧 Send notification
        run: |
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "✅ Staging deployment successful!"
          else
            echo "❌ Staging deployment failed!"
          fi
          # Add Slack/Discord/Email notification here if needed
