# =============================================================================
# iACC - Multi-Domain Deployment Workflow
# =============================================================================
# Manually triggered workflow to deploy to multiple domains simultaneously.
# Uses separate jobs per domain to avoid GitHub Actions matrix limitations.
#
# Target domains:
#   1. iacc.f2.co.th         (production)
#   2. app.mysamuiisland.com (new domain)
#
# =============================================================================
# REQUIRED SECRETS FOR app.mysamuiisland.com
# Add these in: Settings → Secrets and variables → Actions
# -----------------------------------------------------------------------------
#   SAMUI_FTP_SERVER       — FTP server hostname for mysamuiisland.com
#   SAMUI_FTP_USERNAME     — FTP username
#   SAMUI_FTP_PASSWORD     — FTP password
#   SAMUI_FTP_PORT         — FTP port (usually 21)
#   SAMUI_DB_USERNAME      — MySQL database username
#   SAMUI_DB_PASSWORD      — MySQL database password
#   SAMUI_DB_NAME          — MySQL database name
#   SAMUI_DB_HOST          — MySQL host (usually localhost on cPanel)
#
# Existing secrets for iacc.f2.co.th are reused as-is (no changes needed):
#   FTP_SERVER, FTP_USERNAME, FTP_PASSWORD, FTP_PORT
#   DB_USERNAME, DB_PASSWORD, DB_NAME, DB_HOST
# =============================================================================

name: 🌐 Deploy to Multiple Domains

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Which domains to deploy to'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - iacc-only
          - samui-only

jobs:
  # ===========================================================================
  # Job 1: Build & Test (shared artifact for all domains)
  # ===========================================================================
  build:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mysqli, mbstring, xml, gd, curl

      - name: ✅ PHP Syntax Check
        timeout-minutes: 2
        run: |
          echo "Checking main PHP files..."
          php -l index.php
          php -l core-function.php
          php -l login.php
          php -l inc/class.dbconn.php
          php -l inc/security.php
          echo "✅ Syntax check passed"

      - name: 📦 Create deployment artifact
        run: |
          mkdir -p deploy
          rsync -av --progress \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='.DS_Store' \
            --exclude='.venv' \
            --exclude='.env' \
            --exclude='docker' \
            --exclude='docker-compose*.yml' \
            --exclude='Dockerfile' \
            --exclude='*.bak' \
            --exclude='*.backup' \
            --exclude='build' \
            --exclude='node_modules' \
            --exclude='TODAY_WORK_SUMMARY*.txt' \
            --exclude='phpstan.neon' \
            --exclude='deploy-cpanel.sh' \
            --exclude='inc/sys.configs.php' \
            --exclude='inc/docker-settings.json' \
            --exclude='logs/*.log' \
            --exclude='cache/*' \
            --exclude='backups/*' \
            ./ deploy/

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: multi-domain-deploy
          path: deploy/
          retention-days: 5

  # ===========================================================================
  # Job 2a: Deploy to iacc.f2.co.th
  # ===========================================================================
  deploy-iacc:
    name: 🚀 Deploy to iacc.f2.co.th
    runs-on: ubuntu-latest
    needs: build
    if: github.event.inputs.target == 'all' || github.event.inputs.target == 'iacc-only'
    permissions: {}
    environment:
      name: production
      url: https://iacc.f2.co.th

    steps:
      - name: 📥 Download artifact
        uses: actions/download-artifact@v4
        with:
          name: multi-domain-deploy
          path: deploy/

      - name: 🛠️ Generate config for iacc.f2.co.th
        run: |
          mkdir -p deploy/inc
          cat > deploy/inc/sys.configs.php <<EOL
          <?php
          $config["username"] = "${{ secrets.DB_USERNAME }}";
          $config["password"] = "${{ secrets.DB_PASSWORD }}";
          $config["dbname"]   = "${{ secrets.DB_NAME }}";
          $config["host"]     = "${{ secrets.DB_HOST }}";
          EOL
          if [ -f deploy/.htaccess.cpanel ]; then
            cp deploy/.htaccess.cpanel deploy/.htaccess
          fi

      - name: 📤 Deploy to iacc.f2.co.th via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        timeout-minutes: 10
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT || 21 }}
          protocol: ftp
          local-dir: ./deploy/
          server-dir: ./
          timeout: 60000
          log-level: verbose
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.env
            **/logs/*.log
            **/cache/*
            **/backups/*

      - name: ✅ Deployment notification
        run: |
          echo "✅ Deployment to iacc.f2.co.th completed!"
          echo "🌐 URL: https://iacc.f2.co.th"
          echo "📅 Time: $(date)"
          echo "🔖 Commit: ${{ github.sha }}"

  # ===========================================================================
  # Job 2b: Deploy to app.mysamuiisland.com
  # ===========================================================================
  deploy-samui:
    name: 🚀 Deploy to app.mysamuiisland.com
    runs-on: ubuntu-latest
    needs: build
    if: github.event.inputs.target == 'all' || github.event.inputs.target == 'samui-only'
    permissions: {}
    environment:
      name: production-samui
      url: https://app.mysamuiisland.com

    steps:
      - name: 📥 Download artifact
        uses: actions/download-artifact@v4
        with:
          name: multi-domain-deploy
          path: deploy/

      - name: 🛠️ Generate config for app.mysamuiisland.com
        run: |
          mkdir -p deploy/inc
          cat > deploy/inc/sys.configs.php <<EOL
          <?php
          $config["username"] = "${{ secrets.SAMUI_DB_USERNAME }}";
          $config["password"] = "${{ secrets.SAMUI_DB_PASSWORD }}";
          $config["dbname"]   = "${{ secrets.SAMUI_DB_NAME }}";
          $config["host"]     = "${{ secrets.SAMUI_DB_HOST }}";
          EOL
          if [ -f deploy/.htaccess.cpanel ]; then
            cp deploy/.htaccess.cpanel deploy/.htaccess
          fi

      - name: 📤 Deploy to app.mysamuiisland.com via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        timeout-minutes: 10
        with:
          server: ${{ secrets.SAMUI_FTP_SERVER }}
          username: ${{ secrets.SAMUI_FTP_USERNAME }}
          password: ${{ secrets.SAMUI_FTP_PASSWORD }}
          port: ${{ secrets.SAMUI_FTP_PORT || 21 }}
          protocol: ftp
          local-dir: ./deploy/
          server-dir: ./
          timeout: 60000
          log-level: verbose
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.env
            **/logs/*.log
            **/cache/*
            **/backups/*

      - name: ✅ Deployment notification
        run: |
          echo "✅ Deployment to app.mysamuiisland.com completed!"
          echo "🌐 URL: https://app.mysamuiisland.com"
          echo "📅 Time: $(date)"
          echo "🔖 Commit: ${{ github.sha }}"

  # ===========================================================================
  # Job 3a: Health Check — iacc.f2.co.th
  # ===========================================================================
  health-check-iacc:
    name: 🏥 Health Check — iacc.f2.co.th
    runs-on: ubuntu-latest
    needs: deploy-iacc
    if: github.event.inputs.target == 'all' || github.event.inputs.target == 'iacc-only'
    permissions: {}

    steps:
      - name: 🔍 Check iacc.f2.co.th availability
        run: |
          echo "Waiting for deployment to propagate..."
          sleep 30

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://iacc.f2.co.th || echo "000")

          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "302" ]; then
            echo "✅ iacc.f2.co.th is up! HTTP Status: $HTTP_STATUS"
          else
            echo "⚠️ iacc.f2.co.th may have issues. HTTP Status: $HTTP_STATUS"
            # Don't fail the workflow, just warn
          fi

  # ===========================================================================
  # Job 3b: Health Check — app.mysamuiisland.com
  # ===========================================================================
  health-check-samui:
    name: 🏥 Health Check — app.mysamuiisland.com
    runs-on: ubuntu-latest
    needs: deploy-samui
    if: github.event.inputs.target == 'all' || github.event.inputs.target == 'samui-only'
    permissions: {}

    steps:
      - name: 🔍 Check app.mysamuiisland.com availability
        run: |
          echo "Waiting for deployment to propagate..."
          sleep 30

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://app.mysamuiisland.com || echo "000")

          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "302" ]; then
            echo "✅ app.mysamuiisland.com is up! HTTP Status: $HTTP_STATUS"
          else
            echo "⚠️ app.mysamuiisland.com may have issues. HTTP Status: $HTTP_STATUS"
            # Don't fail the workflow, just warn
          fi

  # ===========================================================================
  # Job 4: Deployment Summary
  # ===========================================================================
  summary:
    name: 📋 Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-iacc, deploy-samui, health-check-iacc, health-check-samui]
    if: always()
    permissions: {}

    steps:
      - name: 📊 Print consolidated deployment report
        run: |
          echo "=============================================="
          echo "  🌐 Multi-Domain Deployment Summary"
          echo "=============================================="
          echo "📅 Time     : $(date)"
          echo "🔖 Commit   : ${{ github.sha }}"
          echo "👤 Actor    : ${{ github.actor }}"
          echo "🎯 Target   : ${{ github.event.inputs.target }}"
          echo "----------------------------------------------"
          echo "  deploy-iacc status        : ${{ needs.deploy-iacc.result }}"
          echo "  deploy-samui status       : ${{ needs.deploy-samui.result }}"
          echo "  health-check-iacc status  : ${{ needs.health-check-iacc.result }}"
          echo "  health-check-samui status : ${{ needs.health-check-samui.result }}"
          echo "----------------------------------------------"
          if [ "${{ needs.deploy-iacc.result }}" = "failure" ] || [ "${{ needs.deploy-samui.result }}" = "failure" ]; then
            echo "❌ One or more deployments failed. Check the Deploy job logs."
          elif [ "${{ needs.deploy-iacc.result }}" = "success" ] || [ "${{ needs.deploy-samui.result }}" = "success" ]; then
            echo "✅ All targeted deployments completed successfully!"
          else
            echo "⚠️ Deployment result: iacc=${{ needs.deploy-iacc.result }} samui=${{ needs.deploy-samui.result }}"
          fi
          echo "=============================================="
