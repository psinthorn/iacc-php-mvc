# =============================================================================
# Tracker Agent — Auto-update GitHub Projects on PR merge
# =============================================================================
#
# Triggers when a PR is merged into develop.
# Actions:
#   1. Parse PR body for linked issues (#NNN or "Closes #NNN" / "Fixes #NNN")
#   2. Move those issues to Done in Sprint Board (Project 11)
#   3. Post a tracker summary comment on the PR
#
# Required secret: TRACKER_TOKEN
#   A GitHub Personal Access Token (classic) with scopes: repo + project
#   Add at: Settings → Secrets and variables → Actions → New repository secret
#
# =============================================================================

name: Tracker — Update Sprint Board on Merge

on:
  pull_request:
    types: [closed]
    branches: [develop]

jobs:
  update-board:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Parse linked issues from PR body
        id: parse
        run: |
          PR_BODY=$(cat << 'PRBODY'
          ${{ github.event.pull_request.body }}
          PRBODY
          )
          ISSUES=$(echo "$PR_BODY" | grep -oiE '(close[sd]?|fix(e[sd])?|resolve[sd]?)?\s*#[0-9]+' | grep -oE '[0-9]+' | sort -u | tr '\n' ' ' | xargs)
          echo "issues=$ISSUES" >> $GITHUB_OUTPUT
          echo "Found linked issues: $ISSUES"

      - name: Update Sprint Board — move issues to Done
        if: steps.parse.outputs.issues != ''
        env:
          GH_TOKEN: ${{ secrets.TRACKER_TOKEN }}
          PROJECT_ID: PVT_kwHOADbqcM4BMK9M
          STATUS_FIELD_ID: PVTSSF_lAHOADbqcM4BMK9Mzg7h-VE
          DONE_OPTION_ID: "98236657"
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          ISSUES: ${{ steps.parse.outputs.issues }}
        run: |
          for NUM in $ISSUES; do
            echo "--- Issue #$NUM ---"

            NODE_ID=$(gh api graphql -f query="{
              repository(owner: \"$REPO_OWNER\", name: \"$REPO_NAME\") {
                issue(number: $NUM) { id title }
              }
            }" --jq '.data.repository.issue.id // empty')

            if [ -z "$NODE_ID" ]; then
              echo "Issue #$NUM not found, skipping"
              continue
            fi

            ITEM_ID=$(gh api graphql -f query="mutation {
              addProjectV2ItemById(input: {
                projectId: \"$PROJECT_ID\"
                contentId: \"$NODE_ID\"
              }) { item { id } }
            }" --jq '.data.addProjectV2ItemById.item.id // empty')

            if [ -z "$ITEM_ID" ]; then
              echo "Could not add #$NUM to project"
              continue
            fi

            gh api graphql -f query="mutation {
              updateProjectV2ItemFieldValue(input: {
                projectId: \"$PROJECT_ID\"
                itemId: \"$ITEM_ID\"
                fieldId: \"$STATUS_FIELD_ID\"
                value: { singleSelectOptionId: \"$DONE_OPTION_ID\" }
              }) { projectV2Item { id } }
            }" > /dev/null

            echo "✅ #$NUM moved to Done"
          done

      - name: Post tracker summary comment
        env:
          GH_TOKEN: ${{ secrets.TRACKER_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          MERGED_AT: ${{ github.event.pull_request.merged_at }}
          ISSUES: ${{ steps.parse.outputs.issues }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          DATE=$(echo "$MERGED_AT" | cut -c1-10)

          LINES=""
          for NUM in $ISSUES; do
            LINES="${LINES}- [#${NUM}](https://github.com/${REPO}/issues/${NUM}) moved to Done in Sprint Board"$'\n'
          done
          if [ -z "$ISSUES" ]; then
            LINES="- No linked issues. Add Closes #NNN to PR body to auto-link next time."
          fi

          cat > /tmp/tracker-comment.md << EOF
          ## Tracker Agent - Merge Summary

          Merged: #${PR_NUMBER} ${PR_TITLE}
          By: @${PR_AUTHOR} to develop on ${DATE}

          ### Issues updated
          ${LINES}

          ### Sprint Board
          https://github.com/users/${REPO_OWNER}/projects/11
          EOF

          gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file /tmp/tracker-comment.md
