# =============================================================================
# iACC - Production Deployment Workflow (MVC)
# =============================================================================
# Triggered on push to main branch
# Deploys to: iacc.f2.co.th (production via cPanel FTP)
# =============================================================================

name: 🚀 Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DEPLOY_PATH: .
  PHP_VERSION: '8.2'

jobs:
  # =========================================================================
  # Job 1: Lint & Syntax Check
  # =========================================================================
  lint:
    name: 🔍 Lint & Syntax
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mysqli, mbstring, xml, gd, curl, pdo, pdo_mysql

      - name: ✅ PHP Syntax Check — Core Files
        run: |
          echo "🔍 Checking core infrastructure..."
          php -l index.php
          php -l login.php
          php -l authorize.php
          php -l core-function.php
          php -l menu.php
          php -l inc/security.php
          php -l inc/class.dbconn.php

      - name: ✅ PHP Syntax Check — MVC Layer
        run: |
          echo "🔍 Checking all Controllers..."
          find app/Controllers -name "*.php" | xargs -I {} php -l {}
          
          echo "🔍 Checking all Models..."
          find app/Models -name "*.php" | xargs -I {} php -l {}
          
          echo "🔍 Checking all Views..."
          find views -name "*.php" | xargs -I {} php -l {}
          
          echo "🔍 Checking Config..."
          php -l app/Config/routes.php
          
          echo "✅ All syntax checks passed"

      - name: 📊 MVC Route Audit
        run: |
          php -r "
            \$routes = require 'app/Config/routes.php';
            \$mvc = 0; \$legacy = 0;
            foreach (\$routes as \$k => \$v) {
              if (is_array(\$v)) \$mvc++; else \$legacy++;
            }
            echo \"MVC routes: \$mvc, Legacy routes: \$legacy\n\";
            if (\$legacy > 0) {
              echo \"⚠️  WARNING: \$legacy legacy routes remain\n\";
              exit(1);
            }
            echo \"✅ All routes are MVC\n\";
          "

  # =========================================================================
  # Job 2: Build Deployment Artifact
  # =========================================================================
  build:
    name: 📦 Build
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mysqli, mbstring, xml, gd, curl

      - name: 📦 Install Composer dependencies
        run: |
          if [ -f composer.json ]; then
            composer install --no-dev --optimize-autoloader --no-interaction
          fi

      - name: 🏷️ Generate version.json
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          cat > version.json <<EOF
          {
            "version": "5.0-mvc",
            "commit": "${{ github.sha }}",
            "commit_short": "${SHORT_SHA}",
            "branch": "${{ github.ref_name }}",
            "build_date": "$(date -u '+%Y-%m-%dT%H:%M:%SZ')",
            "build_number": "${{ github.run_number }}",
            "deployed_by": "github-actions"
          }
          EOF
          cat version.json

      - name: 📦 Create deployment artifact
        run: |
          mkdir -p deploy
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='.DS_Store' \
            --exclude='.venv' \
            --exclude='.env' \
            --exclude='docker' \
            --exclude='docker-compose*.yml' \
            --exclude='Dockerfile' \
            --exclude='*.bak' \
            --exclude='*.backup' \
            --exclude='build' \
            --exclude='node_modules' \
            --exclude='legacy' \
            --exclude='tests' \
            --exclude='backups' \
            --exclude='phpstan.neon' \
            --exclude='deploy*.sh' \
            --exclude='DEPLOYMENT_FILE_INDEX.sh' \
            --exclude='backup.sh' \
            --exclude='inc/sys.configs.php' \
            --exclude='inc/docker-settings.json' \
            --exclude='logs/*.log' \
            --exclude='cache/*' \
            --exclude='.htaccess' \
            ./ deploy/

          # Use cPanel htaccess for production
          if [ -f deploy/.htaccess.cpanel ]; then
            cp deploy/.htaccess.cpanel deploy/.htaccess
          fi

      - name: 🛠️ Generate production config
        run: |
          cat > deploy/inc/sys.configs.php << 'PHPEOF'
          <?PHP
          $composerAutoload = dirname(__FILE__) . "/../vendor/autoload.php";
          if (file_exists($composerAutoload)) { require_once($composerAutoload); }
          require_once(dirname(__FILE__) . "/error-handler.php");
          ini_set('session.cookie_httponly', 1);
          ini_set('session.use_strict_mode', 1);
          ini_set('session.cookie_samesite', 'Lax');
          ini_set('session.cookie_secure', 1);
          if (!empty($_SERVER['HTTPS']) && $_SERVER['HTTPS'] !== 'off') {
              ini_set('session.cookie_secure', 1);
          }
          $appEnv = 'production';
          PHPEOF

          cat >> deploy/inc/sys.configs.php << EOF
          \$config["hostname"] = "${{ secrets.DB_HOST }}";
          \$config["username"] = "${{ secrets.DB_USERNAME }}";
          \$config["password"] = "${{ secrets.DB_PASSWORD }}";
          \$config["dbname"]   = "${{ secrets.DB_NAME }}";
          date_default_timezone_set("Asia/Bangkok");
          \$config["docker_tools"] = "off";
          \$config["container_manager"] = "off";
          define('DOCKER_SETTINGS_FILE', dirname(__FILE__) . '/docker-settings.json');
          EOF

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-deploy
          path: deploy/
          retention-days: 5

  # =========================================================================
  # Job 3: Deploy to Production (cPanel FTP)
  # =========================================================================
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: https://iacc.f2.co.th

    steps:
      - name: 📥 Download artifact
        uses: actions/download-artifact@v4
        with:
          name: production-deploy
          path: deploy/

      - name: 📤 Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        timeout-minutes: 30
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./deploy/
          server-dir: ${{ env.DEPLOY_PATH }}/
          timeout: 300000
          log-level: verbose
          dangerous-clean-slate: false
          exclude: |
            **/.git*/**
            **/node_modules/**
            **/.env
            **/logs/*.log

      - name: ✅ Deploy complete
        run: |
          echo "✅ Production deployment completed!"
          echo "🌐 URL: https://iacc.f2.co.th"
          echo "📅 Time: $(date -u)"
          echo "🔖 Commit: ${{ github.sha }}"
          echo "🏷️ Build: #${{ github.run_number }}"

  # =========================================================================
  # Job 4: Health Check
  # =========================================================================
  health-check:
    name: 🏥 Health Check
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: 🔍 Verify site is up
        run: |
          echo "Waiting 30s for deployment..."
          sleep 30

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://iacc.f2.co.th/login.php || echo "000")
          echo "Login page: HTTP $HTTP_STATUS"

          HEALTH=$(curl -s -o /dev/null -w "%{http_code}" "https://iacc.f2.co.th/index.php?page=health" || echo "000")
          echo "Health endpoint: HTTP $HEALTH"

          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "302" ]; then
            echo "✅ Site is up!"
          else
            echo "⚠️ Site may have issues. HTTP Status: $HTTP_STATUS"
          fi
