# =============================================================================
# iACC - Production Deployment Workflow (MVC)
# =============================================================================
# Triggered on push to main branch
# Deploys to: iacc.f2.co.th (production via cPanel FTP)
# =============================================================================

name: 🚀 Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DEPLOY_PATH: .
  PHP_VERSION: '8.2'

jobs:
  # =========================================================================
  # Job 1: Lint & Syntax Check
  # =========================================================================
  lint:
    name: 🔍 Lint & Syntax
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mysqli, mbstring, xml, gd, curl, pdo, pdo_mysql

      - name: ✅ PHP Syntax Check — Core Files
        run: |
          echo "🔍 Checking core infrastructure..."
          php -l index.php
          php -l login.php
          php -l api.php
          php -l landing.php
          php -l inc/security.php
          php -l inc/class.dbconn.php
          php -l app/Config/routes.php

      - name: ✅ PHP Syntax Check — MVC Layer
        run: |
          echo "🔍 Checking all Controllers..."
          find app/Controllers -name "*.php" | xargs -I {} php -l {}
          
          echo "🔍 Checking all Models..."
          find app/Models -name "*.php" | xargs -I {} php -l {}
          
          echo "🔍 Checking all Views..."
          find app/Views -name "*.php" | xargs -I {} php -l {}
          
          echo "🔍 Checking Services..."
          find app/Services -name "*.php" | xargs -I {} php -l {}
          
          echo "✅ All syntax checks passed"

      - name: 📊 MVC Route Audit
        run: |
          php -r "
            \$routes = require 'app/Config/routes.php';
            \$mvc = 0; \$legacy = 0;
            foreach (\$routes as \$k => \$v) {
              if (is_array(\$v)) \$mvc++; else \$legacy++;
            }
            echo \"MVC routes: \$mvc, Legacy routes: \$legacy\n\";
            if (\$legacy > 0) {
              echo \"⚠️  WARNING: \$legacy legacy routes remain\n\";
              exit(1);
            }
            echo \"✅ All routes are MVC\n\";
          "

  # =========================================================================
  # Job 2: Build Deployment Artifact
  # =========================================================================
  build:
    name: 📦 Build
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mysqli, mbstring, xml, gd, curl

      - name: 📦 Install Composer dependencies
        run: |
          if [ -f composer.json ]; then
            composer install --no-dev --optimize-autoloader --no-interaction
          fi

      - name: 🏷️ Generate version.json
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          cat > version.json <<EOF
          {
            "version": "5.0-mvc",
            "commit": "${{ github.sha }}",
            "commit_short": "${SHORT_SHA}",
            "branch": "${{ github.ref_name }}",
            "build_date": "$(date -u '+%Y-%m-%dT%H:%M:%SZ')",
            "build_number": "${{ github.run_number }}",
            "deployed_by": "github-actions"
          }
          EOF
          cat version.json

      - name: 📦 Create deployment artifact
        run: |
          mkdir -p deploy
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='.DS_Store' \
            --exclude='.venv' \
            --exclude='.env' \
            --exclude='docker' \
            --exclude='docker-compose*.yml' \
            --exclude='Dockerfile' \
            --exclude='*.bak' \
            --exclude='*.backup' \
            --exclude='build' \
            --exclude='node_modules' \
            --exclude='legacy' \
            --exclude='tests' \
            --exclude='backups' \
            --exclude='phpstan.neon' \
            --exclude='deploy*.sh' \
            --exclude='DEPLOYMENT_FILE_INDEX.sh' \
            --exclude='backup.sh' \
            --exclude='inc/sys.configs.php' \
            --exclude='inc/docker-settings.json' \
            --exclude='logs/*.log' \
            --exclude='cache/*' \
            --exclude='.htaccess' \
            ./ deploy/

          # Use cPanel htaccess for production
          if [ -f deploy/.htaccess.cpanel ]; then
            cp deploy/.htaccess.cpanel deploy/.htaccess
          fi

      - name: 🛠️ Generate production config
        env:
          PROD_DB_HOST: ${{ secrets.DB_HOST }}
          PROD_DB_USER: ${{ secrets.DB_USERNAME }}
          PROD_DB_PASS: ${{ secrets.DB_PASSWORD }}
          PROD_DB_NAME: ${{ secrets.DB_NAME }}
          PROD_CRON_TOKEN: ${{ secrets.CRON_TOKEN_PRODUCTION }}
        run: |
          {
            echo '<?PHP'
            echo '$composerAutoload = dirname(__FILE__) . "/../vendor/autoload.php";'
            echo 'if (file_exists($composerAutoload)) { require_once($composerAutoload); }'
            echo 'require_once(dirname(__FILE__) . "/error-handler.php");'
            echo "ini_set('session.cookie_httponly', 1);"
            echo "ini_set('session.use_strict_mode', 1);"
            echo "ini_set('session.cookie_samesite', 'Lax');"
            echo "ini_set('session.cookie_secure', 1);"
            echo 'if (!empty($_SERVER["HTTPS"]) && $_SERVER["HTTPS"] !== "off") {'
            echo '    ini_set("session.cookie_secure", 1);'
            echo '}'
            echo '$appEnv = "production";'
            echo "\$config[\"hostname\"] = \"${PROD_DB_HOST}\";"
            echo "\$config[\"username\"] = \"${PROD_DB_USER}\";"
            echo "\$config[\"password\"] = \"${PROD_DB_PASS}\";"
            echo "\$config[\"dbname\"]   = \"${PROD_DB_NAME}\";"
            echo "\$config[\"cron_token\"] = \"${PROD_CRON_TOKEN}\";"
            echo 'date_default_timezone_set("Asia/Bangkok");'
            echo '$config["docker_tools"] = "off";'
            echo '$config["container_manager"] = "off";'
            echo "define('DOCKER_SETTINGS_FILE', dirname(__FILE__) . '/docker-settings.json');"
          } > deploy/inc/sys.configs.php

          echo "✅ Production config generated"
          # Print first 5 lines without revealing the cron_token
          head -5 deploy/inc/sys.configs.php

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-deploy
          path: deploy/
          retention-days: 5

  # =========================================================================
  # Job 3: Deploy to Production (cPanel FTP)
  # =========================================================================
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: https://iacc.f2.co.th

    steps:
      - name: 📥 Download artifact
        uses: actions/download-artifact@v4
        with:
          name: production-deploy
          path: deploy/

      - name: 📤 Deploy via FTP (attempt 1)
        id: ftp-deploy-1
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        timeout-minutes: 30
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          security: loose
          port: 21
          local-dir: ./deploy/
          server-dir: ${{ env.DEPLOY_PATH }}/
          timeout: 600000
          log-level: verbose
          dangerous-clean-slate: false
          exclude: |
            **/.git*/**
            **/node_modules/**
            **/.env
            **/logs/*.log

      - name: ⏳ Wait before retry
        if: steps.ftp-deploy-1.outcome == 'failure'
        run: |
          echo "⚠️ FTP attempt 1 failed (passive mode timeout). Retrying in 30s..."
          sleep 30

      - name: 📤 Deploy via FTP (attempt 2)
        if: steps.ftp-deploy-1.outcome == 'failure'
        id: ftp-deploy-2
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        timeout-minutes: 30
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          security: loose
          port: 21
          local-dir: ./deploy/
          server-dir: ${{ env.DEPLOY_PATH }}/
          timeout: 600000
          log-level: verbose
          dangerous-clean-slate: false
          exclude: |
            **/.git*/**
            **/node_modules/**
            **/.env
            **/logs/*.log

      - name: ⏳ Wait before final retry
        if: steps.ftp-deploy-1.outcome == 'failure' && steps.ftp-deploy-2.outcome == 'failure'
        run: |
          echo "⚠️ FTP attempt 2 failed. Final retry in 60s..."
          sleep 60

      - name: 📤 Deploy via FTP (attempt 3 - final)
        if: steps.ftp-deploy-1.outcome == 'failure' && steps.ftp-deploy-2.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        timeout-minutes: 30
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          security: loose
          port: 21
          local-dir: ./deploy/
          server-dir: ${{ env.DEPLOY_PATH }}/
          timeout: 600000
          log-level: verbose
          dangerous-clean-slate: false
          exclude: |
            **/.git*/**
            **/node_modules/**
            **/.env
            **/logs/*.log

      - name: ✅ Deploy complete
        run: |
          echo "✅ Production deployment completed!"
          echo "🌐 URL: https://iacc.f2.co.th"
          echo "📅 Time: $(date -u)"
          echo "🔖 Commit: ${{ github.sha }}"
          echo "🏷️ Build: #${{ github.run_number }}"

  # =========================================================================
  # Job 4: Health Check
  # =========================================================================
  health-check:
    name: 🏥 Health Check
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: 🔍 Verify site is up
        run: |
          echo "Waiting 30s for deployment..."
          sleep 30

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://iacc.f2.co.th/login.php || echo "000")
          echo "Login page: HTTP $HTTP_STATUS"

          HEALTH=$(curl -s -o /dev/null -w "%{http_code}" "https://iacc.f2.co.th/index.php?page=health" || echo "000")
          echo "Health endpoint: HTTP $HEALTH"

          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "302" ]; then
            echo "✅ Site is up!"
          else
            echo "⚠️ Site may have issues. HTTP Status: $HTTP_STATUS"
          fi
