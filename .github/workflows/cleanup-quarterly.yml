# =============================================================================
# Cleanup — Quarterly Reminder
# =============================================================================
#
# Opens a tracking issue every quarter telling the PM/Cleaner agent to run
# a cleanup scan. The agent itself is advisory-first (see ai/prompts/agent-cleaner.md)
# — this workflow does NOT delete anything, and never auto-merges.
#
# Schedule: 03:00 UTC on the 1st of January, April, July, October.
# Manual trigger: pick any in-scope category from the dropdown.
#
# Required secrets:
#   TRACKER_TOKEN — PAT with repo + project scope (already set)
#
# =============================================================================

name: Cleanup — Quarterly Reminder

on:
  schedule:
    # 03:00 UTC, 1st of Jan/Apr/Jul/Oct
    - cron: '0 3 1 1,4,7,10 *'
  workflow_dispatch:
    inputs:
      category:
        description: 'Cleanup category to scan'
        required: true
        default: 'stale-docs'
        type: choice
        options:
          - stale-docs
          - orphan-root-php
          - duplicate-migrations
          - unused-assets
          - dead-translation-keys
          - unrouted-controllers
          - leftover-temp
          - redundant-deploy-scripts
          - stale-github-actions

jobs:
  open-cleanup-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Determine category
        id: cat
        run: |
          CATEGORY="${{ github.event.inputs.category }}"
          if [ -z "$CATEGORY" ]; then
            # Cron run — default to lowest blast radius
            CATEGORY="stale-docs"
          fi
          echo "category=$CATEGORY" >> $GITHUB_OUTPUT
          echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT
          echo "quarter=Q$(( ($(date +%-m) - 1) / 3 + 1 )) $(date +%Y)" >> $GITHUB_OUTPUT

      - name: Open cleanup tracking issue
        env:
          GH_TOKEN: ${{ secrets.TRACKER_TOKEN }}
          REPO: ${{ github.repository }}
          CATEGORY: ${{ steps.cat.outputs.category }}
          DATE: ${{ steps.cat.outputs.date }}
          QUARTER: ${{ steps.cat.outputs.quarter }}
        run: |
          cat > /tmp/cleanup-issue.md << EOF
          ## 🧹 Quarterly Cleanup Scan — \`${CATEGORY}\`

          **Triggered:** ${DATE} (${QUARTER})
          **Category:** \`${CATEGORY}\`
          **Agent:** Cleaner (see [ai/prompts/agent-cleaner.md](ai/prompts/agent-cleaner.md))

          ### How To Run

          The Cleaner agent is **advisory-first** — it produces a report but does **not** delete anything itself. To run this scan:

          1. Check out a fresh \`develop\` branch:
             \`\`\`bash
             git checkout develop && git pull
             \`\`\`
          2. Open Claude Code and tell it:
             \`\`\`
             act as cleaner
             Run cleanup scan for category: ${CATEGORY}
             \`\`\`
          3. Review the report at \`tmp/cleaner/${DATE}/cleanup-report-${CATEGORY}.md\`
          4. If candidates look right, run the generated script:
             \`\`\`bash
             bash tmp/cleaner/${DATE}/cleanup-${CATEGORY}.sh
             \`\`\`
             This creates a branch \`chore/cleanup-${CATEGORY}-${DATE}\` and one commit. **It does not push.**
          5. Push and open a PR:
             \`\`\`bash
             git push -u origin chore/cleanup-${CATEGORY}-${DATE}
             gh pr create --base develop --reviewer psinthorn --label cleanup
             \`\`\`
          6. **Required reviewers (first 3 runs):** PM + Security agent

          ### Safety Reminders

          - ❌ Never run multiple categories in one PR
          - ❌ Never push directly to \`develop\` or \`main\`
          - ❌ Never delete migration files
          - ❌ Never touch \`upload/\`, \`file/\`, \`legacy/\`, \`backups/\`
          - ✅ Each PR must be revertable via \`git revert\`
          - ✅ Run smoke tests after merge (curl key URLs, \`docker compose ps\`)

          ### Acceptance Criteria

          - [ ] Cleaner generated \`tmp/cleaner/${DATE}/cleanup-report-${CATEGORY}.md\`
          - [ ] PM reviewed report and approved high-confidence candidates
          - [ ] Cleanup PR opened on \`chore/cleanup-${CATEGORY}-${DATE}\`
          - [ ] Security agent reviewed PR diff (first 3 runs only)
          - [ ] Smoke tests pass after merge
          - [ ] This issue closed with a comment linking the merged PR

          ---
          *Auto-generated by [.github/workflows/cleanup-quarterly.yml](.github/workflows/cleanup-quarterly.yml). To skip a quarter, close this issue with comment \`skip\`.*
          EOF

          gh issue create \
            --repo "$REPO" \
            --title "chore(cleanup): ${QUARTER} — ${CATEGORY} scan" \
            --body-file /tmp/cleanup-issue.md \
            --label "cleanup" \
            --label "planned" \
            --assignee psinthorn
